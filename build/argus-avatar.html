<!doctype html>
<meta charset="utf-8" />
<title>Argus avatar — download PNG</title>
<style>
  body { margin: 0; min-height: 100vh; display: grid; place-items: center; gap: 20px;
         background: #0b1220; color: #cbd5e1; font: 15px/1.5 system-ui, sans-serif; }
  #wrap { display: grid; place-items: center; gap: 18px; padding: 32px; }
  svg { width: 280px; height: 280px; border-radius: 24px; box-shadow: 0 12px 40px #0006; }
  button { background: #14b8a6; color: #06231f; border: 0; border-radius: 10px;
           padding: 12px 22px; font-weight: 700; font-size: 15px; cursor: pointer; }
  button:hover { background: #2dd4bf; }
  small { opacity: .7; max-width: 320px; text-align: center; }
</style>
<div id="wrap">
  <!-- 1:1 Argus mark: an all-seeing eye inside a trust shield, on X Layer teal. -->
  <svg id="logo" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#0f766e"/>
        <stop offset="1" stop-color="#0b1220"/>
      </linearGradient>
      <radialGradient id="iris" cx="0.5" cy="0.5" r="0.5">
        <stop offset="0" stop-color="#5eead4"/>
        <stop offset="0.55" stop-color="#14b8a6"/>
        <stop offset="1" stop-color="#0f766e"/>
      </radialGradient>
    </defs>
    <rect width="512" height="512" rx="112" fill="url(#bg)"/>
    <!-- shield -->
    <path d="M256 64 L400 116 V256 C400 348 336 410 256 448 C176 410 112 348 112 256 V116 Z"
          fill="none" stroke="#5eead4" stroke-width="14" stroke-linejoin="round" opacity="0.9"/>
    <!-- eye -->
    <path d="M150 256 C190 196 322 196 362 256 C322 316 190 316 150 256 Z"
          fill="#0b1220" stroke="#5eead4" stroke-width="10"/>
    <circle cx="256" cy="256" r="46" fill="url(#iris)"/>
    <circle cx="256" cy="256" r="18" fill="#04110f"/>
    <circle cx="272" cy="240" r="7" fill="#e2fbf6"/>
  </svg>
  <button onclick="dl()">Download PNG (512×512)</button>
  <small>Click to save <b>argus.png</b> — upload that as your ASP avatar on OKX.AI.</small>
</div>
<script>
  function dl() {
    const svg = document.getElementById('logo');
    const xml = new XMLSerializer().serializeToString(svg);
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = c.height = 512;
      const ctx = c.getContext('2d');
      ctx.drawImage(img, 0, 0, 512, 512);
      c.toBlob((b) => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(b);
        a.download = 'argus.png';
        a.click();
      }, 'image/png');
    };
    img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(xml)));
  }
</script>
